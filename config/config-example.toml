# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  vdub Configuration
#  Video Dubbing & Subtitle Engine — Rust + MLX
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[app]
    segment_duration = 5           # Audio split interval (minutes). 5-10 recommended.
    transcribe_parallel_num = 1    # Max concurrent transcription jobs. 1 for local models.
    translate_parallel_num = 3     # Max concurrent translation jobs.
    tts_parallel_num = 3           # Max concurrent TTS jobs. Default: 3.
    transcribe_max_attempts = 3    # Retry count for transcription.
    translate_max_attempts = 5     # Retry count for translation.
    max_sentence_length = 70       # Max chars per subtitle sentence. 50-70 recommended.
    proxy = ""                     # HTTP proxy (e.g. http://127.0.0.1:7890)
    auto_detect_language = true    # Auto-detect source language via Whisper
    default_target_language = "ru" # Default target when auto-detect is off

[server]
    host = "127.0.0.1"
    port = 8888

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# LLM — any OpenAI-compatible API (OpenAI, DeepSeek, local mlx_lm.server)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[llm]
    base_url = "http://localhost:1234/v1"  # LM Studio default. For mlx_lm: "http://localhost:8080/v1"
    api_key = "not-needed"                 # Local LLM — no key required
    model = "qwen2.5-72b-instruct-abliterated"  # Or any model loaded in LM Studio

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Transcription (ASR) — all free, local providers
# Providers: fasterwhisper, whisperkit, whispercpp, mlx-whisper
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[transcribe]
    provider = "fasterwhisper"       # Choose your ASR provider
    enable_gpu_acceleration = false  # For fasterwhisper GPU acceleration

    [transcribe.fasterwhisper]
        model = "medium"    # Options: tiny, medium, large-v2

    [transcribe.whisperkit]
        model = "large-v2"  # macOS Apple Silicon only

    [transcribe.whispercpp]
        model = "large-v2"

    # Apple Silicon MLX Whisper — fastest on-device ASR
    # Uses Metal GPU automatically, no configuration needed
    [transcribe.mlx_whisper]
        model = "mlx-community/whisper-large-v3-mlx"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Text-to-Speech (TTS) — all free, local providers
# Providers: edge-tts, mlx-audio, fish-speech, qwen3-tts, chatterbox
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[tts]
    provider = "edge-tts"        # Choose your TTS provider
    voice_clone = true           # Clone original speaker's voice (qwen3-tts, fish-speech, chatterbox)
    voice_ref_duration = 7.0     # Seconds of reference audio for voice cloning (3-30s, 7s sweet spot)
    enable_emotion = true        # Detect emotions per subtitle and inject into TTS

    # Apple Silicon MLX Audio — on-device Kokoro TTS
    # Supports: English, Japanese, Mandarin, Spanish, French
    # ~82M parameters, very fast on M-series chips
    [tts.mlx_audio]
        model = "mlx-community/Kokoro-82M-bf16"
        voice = "af_heart"   # Default voice

    # Fish Speech S2 Pro — voice cloning + emotion tags
    # 15K+ inline emotion tags ([excited], [whisper], [angry], etc.)
    # Russian tier 2, 44.1 kHz, Apple Silicon via MLX
    # CLI: --tts-provider fish-speech
    [tts.fish_speech]
        model = "mlx-community/fish-audio-s2-pro-8bit"  # 6.72 GB 8-bit MLX

    # Qwen3-TTS — voice cloning via ICL (recommended for dubbing)
    # Zero-shot cloning from 3-8s reference with transcript
    # Russian tier 1 (native), 24 kHz, Apple Silicon via MLX (native)
    # Emotion from reference prosody + text understanding (implicit)
    # Proven for YouTube dubbing (yt-dbl project uses this)
    # CLI: --tts-provider qwen3-tts
    [tts.qwen3_tts]
        model = "mlx-community/Qwen3-TTS-12Hz-1.7B-Base-bf16"

    # Chatterbox — MIT licensed, emotion exaggeration control
    # Single parameter: 0.0 = monotone, 0.5 = natural, 1.0 = dramatic
    # Voice cloning from 5s reference, 23 languages incl. Russian
    # PyTorch MPS on Apple Silicon
    # CLI: --tts-provider chatterbox
    [tts.chatterbox]
        exaggeration = 0.5

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Full Local Setup (zero cloud dependencies)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Option A: LM Studio (recommended — GUI, easy model management)
#   1. Install LM Studio: https://lmstudio.ai
#   2. Download a model (e.g. Qwen2.5-72B-Instruct-abliterated Q8_0)
#   3. Load the model and start the server (Developer tab → Start Server)
#   4. Config:
#      [llm]
#          base_url = "http://localhost:1234/v1"
#          api_key = "not-needed"
#          model = "qwen2.5-72b-instruct-abliterated"
#
# Option B: mlx_lm.server (lightweight, CLI-only)
#   1. uv pip install mlx-lm
#   2. mlx_lm.server --model mlx-community/Qwen2.5-7B-Instruct-4bit --port 8080
#   3. Config:
#      [llm]
#          base_url = "http://localhost:8080/v1"
#          api_key = "not-needed"
#          model = "mlx-community/Qwen2.5-7B-Instruct-4bit"
#
# For full on-device pipeline with voice cloning (ASR + TTS + translation):
#   [transcribe]
#       provider = "mlx-whisper"
#   [tts]
#       provider = "qwen3-tts"      # Voice cloning + Russian, MLX native
#       # or "fish-speech"           # Voice cloning + emotion tags, MLX
#       # or "chatterbox"            # Voice cloning + emotion exaggeration, PyTorch MPS
#
# This runs the entire dubbing pipeline on-device using Metal GPU.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
